project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about/index.qmd
    - post/

website:
  title: "econometrics.blog"
  site-url: https://www.econometrics.blog
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: about/index.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/fditraglia/econometrics.blog
      - icon: rss
        href: index.xml
  comments:
    utterances:
      repo: fditraglia/econometrics.blog-comments
      issue-term: pathname
      theme: github-light

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    code-fold: false
    highlight-style: github
    include-after-body:
      text: |
        <script data-goatcounter="https://econometrics.goatcounter.com/count"
                async src="//gc.zgo.at/count.js"></script>

freeze: auto
